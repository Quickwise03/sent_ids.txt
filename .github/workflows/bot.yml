name: Run Bot
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install telethon requests beautifulsoup4
      - run: python bot.py
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
      - run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add sent_ids.txt
          git diff --staged --quiet || git commit -m "update ids"
          git fetch origin main
          git reset --soft origin/main
          git add sent_ids.txt
          git diff --staged --quiet || git commit -m "update ids"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main --force
