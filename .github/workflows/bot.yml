name: Run Bot
on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install telethon requests beautifulsoup4
      - run: python bot.py
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
      - run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          rm -f *.session
          rm -f *.session-journal
          git checkout -- .
          git add -f sent_ids.txt sent_urls.txt
          git commit -m "update ids" || echo "no change"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main --force

